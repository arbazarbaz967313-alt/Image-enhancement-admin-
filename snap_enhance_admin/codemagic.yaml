workflows:
  android-release:
    name: Snap Enhance Admin - Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - keystore_reference   # Codemagic dashboard me keystore upload karo
    scripts:
      - name: Get packages
        script: |
          cd admin_panel
          flutter pub get
      - name: Build APK
        script: |
          cd admin_panel
          flutter build apk --release --target-platform android-arm64
    artifacts:
      - admin_panel/build/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
        notify:
          success: true
          failure: true
