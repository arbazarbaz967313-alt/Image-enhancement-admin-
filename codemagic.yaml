workflows:
  android-release:
    name: Snap Enhance Admin - Android APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd snap_enhance_admin
          flutter pub get
      - name: Build APK
        script: |
          cd snap_enhance_admin
          flutter build apk --debug
    artifacts:
      - snap_enhance_admin/build/outputs/flutter-apk/app-debug.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
