workflows:
  android-release:
    name: Snap Enhance Admin - Android APK
    max_build_duration: 60
    environment:
      flutter: 3.19.6
    scripts:
      - name: Get Flutter packages
        script: |
          cd snap_enhance_admin
          flutter pub get
      - name: Build APK
        script: |
          cd snap_enhance_admin
          flutter build apk --debug
    artifacts:
      - snap_enhance_admin/build/app/outputs/flutter-apk/app-debug.apk
      - snap_enhance_admin/build/app/outputs/apk/debug/app-debug.apk
    publishing:
      email:
        recipients:
          - filmexplainthefact@gmail.com
        notify:
          success: true
          failure: true
